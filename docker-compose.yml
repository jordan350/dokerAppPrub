services:
  db:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpwd
      MYSQL_DATABASE: polidb
      MYSQL_USER: polidbuser
      MYSQL_PASSWORD: polidbpassword
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpwd"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - appnet

  api:
    build: ./api
    container_name: api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: polidb
      DB_USER: polidbuser
      DB_PASSWORD: polidbpassword
    ports:
      - "3000:3000"
    networks:
      - appnet

  app:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - appnet

volumes:
  mysql_data:

networks:
  appnet:
    driver: bridge