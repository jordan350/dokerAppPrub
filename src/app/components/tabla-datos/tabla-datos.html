<div class="card shadow border-0">
  <div class="card-header bg-dark text-white">
    <h4 class="mb-0">Registros Almacenados</h4>
  </div>
  <div class="card-body">
    <div class="table-responsive">
      <table class="table table-striped table-hover align-middle">
        <thead class="table-secondary">
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Categoría</th>
            <th>Fecha</th>
            <th>Cantidad</th>
            <th>Estado</th>
            <th>Descripción</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of listaRegistros">
            <td class="fw-bold text-primary">#{{item.id}}</td>
            <td>{{item.nombre}}</td>
            <td><span class="badge bg-light text-dark border">{{item.categoria}}</span></td>
            <td>{{item.fecha | date:'dd/MM/yyyy'}}</td>
            <td>{{item.cantidad}}</td>
            <td>
              <span class="badge" [ngClass]="item.esActivo ? 'bg-success' : 'bg-danger'">
                {{item.esActivo ? 'Activo' : 'Inactivo'}}
              </span>
            </td>
            <td class="small text-muted text-truncate" style="max-width: 150px;">{{item.descripcion}}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
